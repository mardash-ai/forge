name: Publish control-plane image

# Publishes the Forge CONTROL PLANE image to GitHub Container Registry (GHCR).
# Triggers:
#   - pushing a version tag (e.g. v0.1.0) -> publishes :0.1.0 and :latest
#   - manual run from the Actions tab      -> publishes :latest
#
# Images are arm64-only, built NATIVELY on an arm64 runner (no QEMU) — the only runtime target is the
# arm64 Apple-Silicon box. (If an x86 host ever needs it, add linux/amd64 back + a QEMU step, or a matrix.)
#
# The image name uses the repository owner, so it works for any org/user that
# hosts this repo (e.g. ghcr.io/mardash-ai/forge-control-plane).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    # Native arm64 runner (no QEMU). The only runtime target is the arm64 box (Apple Silicon Mac mini);
    # emulating the arm64 leg on an x86 runner took ~3-6 min + double the Actions minutes. Native ≈1 min.
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/forge-control-plane
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Forge Control Plane
            com.mardash-ai.plane=control

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
