name: CI

# Fast feedback on every PR and push to main: run the platform's own unit tests.
# These tests are pure (log-analyzer heuristics, scaffold shape) and need no
# Docker, so they run directly on the runner for speed.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

  # P26 — the SAME suite against the Postgres + object-store backends, so "green on both backends" is
  # enforced, not just claimed. A Postgres service + a MinIO container are stood up; the vitest.pg.config
  # selects Postgres for identity/search/events/notifications and s3 (MinIO) for blob bytes (metadata in
  # Postgres). The filesystem-only stores are unaffected; the pg-* tests exercise the Postgres/S3 paths.
  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: forge_platform
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: forge_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forge_platform -d forge_platform"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      # MinIO is started as a container (a `services:` block can't pass the required `server /data` arg).
      - name: Start MinIO (S3-compatible object store)
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:9000/minio/health/live >/dev/null; then echo "minio up"; break; fi
            sleep 1
          done

      - name: Run the suite on the Postgres + object-store backends
        env:
          FORGE_DB_URL: postgres://forge_platform:ci@127.0.0.1:5432/forge_platform
          FORGE_S3_ENDPOINT: http://127.0.0.1:9000
          FORGE_S3_BUCKET: forge-ci-blobs
          FORGE_S3_ACCESS_KEY: minioadmin
          FORGE_S3_SECRET_KEY: minioadmin
        run: npm run test:pg
