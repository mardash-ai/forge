name: Publish data-plane image

# Publishes the Forge DATA PLANE image (production/runtime, slim — no dev deps) to
# GHCR. Unlike the control-plane image (versioned releases via a tag), the data
# plane publishes CONTINUOUSLY:
#   - push to main       -> :latest and :sha-<short>
#   - push a version tag -> :X.Y.Z (kept in lockstep with control-plane releases)
#
# arm64-only, built NATIVELY on an arm64 runner (no QEMU) — the only runtime target is the arm64 box.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    # Native arm64 runner (no QEMU). The only runtime target is the arm64 box (Apple Silicon Mac mini);
    # emulating the arm64 leg on an x86 runner took ~1-3 min + double the Actions minutes. Native ≈1 min.
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/forge-data-plane
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Forge Data Plane
            com.mardash-ai.plane=data

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.data-plane
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
